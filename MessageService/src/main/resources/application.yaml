server:
  port: 8085

spring:
  application:
    name: MessageService

  datasource:
    url: jdbc:postgresql://localhost:5432/messagedb
    username: postgres
    password: 13102002

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"